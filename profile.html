<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Oseï</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mitsubishi: { red: '#E7192D', dark: '#1a1a1a', grey: '#727070' }
                    }
                }
            }
        }
    </script>
    <style>body { font-family: 'Inter', sans-serif; background-color: #F9FAFB; }</style>
</head>
<body class="bg-gray-50 pb-24">
    <header class="bg-white border-b border-gray-100">
        <div class="max-w-3xl mx-auto px-4 h-14 flex items-center justify-between">
            <a href="home.html" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100">
                <i class="fas fa-arrow-left text-gray-600"></i>
            </a>
            <h1 class="font-semibold text-gray-900">Profil</h1>
            <a href="#" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-600">
                <i class="fas fa-cog"></i>
            </a>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-6">
        <div class="bg-gradient-to-br from-slate-900 to-slate-800 rounded-2xl p-6 text-white mb-6 relative overflow-hidden">
            <div class="flex items-center gap-4 relative z-10">
                <div class="w-16 h-16 rounded-full border-2 border-white/30 overflow-hidden">
                    <img src="https://i.pravatar.cc/150?img=5" class="w-full h-full object-cover" alt="Stefani">
                </div>
                <div class="flex-1">
                    <h2 class="text-xl font-bold">Stefani Agustina</h2>
                    <p class="text-sm text-gray-300">stefani@ptautomasi.com</p>
                    <span class="bg-yellow-500/20 text-yellow-400 text-xs px-2 py-1 rounded-full flex items-center gap-1 border border-yellow-500/30 w-fit mt-2">
                        <i class="fas fa-crown text-[10px]"></i> Gold Member
                    </span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="bg-white rounded-xl p-4 text-center shadow-sm border border-gray-100">
                <p class="text-xl font-bold text-gray-900">24</p>
                <p class="text-xs text-gray-500">Pesanan</p>
            </div>
            <div class="bg-white rounded-xl p-4 text-center shadow-sm border border-gray-100">
                <p class="text-xl font-bold text-green-600">20</p>
                <p class="text-xs text-gray-500">Selesai</p>
            </div>
            <div class="bg-white rounded-xl p-4 text-center shadow-sm border border-gray-100">
                <p class="text-xl font-bold text-orange-500">4</p>
                <p class="text-xs text-gray-500">Process</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <a href="order-detail.html" class="flex items-center gap-4 p-4 border-b border-gray-100 hover:bg-gray-50">
                <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
                    <i class="fas fa-clipboard-list"></i>
                </div>
                <div class="flex-1">
                    <h3 class="font-semibold text-gray-900">Pesanan Saya</h3>
                    <p class="text-xs text-gray-500">Lihat riwayat dan status</p>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-sm"></i>
            </a>

            <a href="shipping.html" class="flex items-center gap-4 p-4 border-b border-gray-100 hover:bg-gray-50">
                <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center text-red-600">
                    <i class="fas fa-map-marker-alt"></i>
                </div>
                <div class="flex-1">
                    <h3 class="font-semibold text-gray-900">Alamat Pengiriman</h3>
                    <p class="text-xs text-gray-500">2 alamat tersimpan</p>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-sm"></i>
            </a>

            <a href="#" class="flex items-center gap-4 p-4 border-b border-gray-100 hover:bg-gray-50">
                <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center text-green-600">
                    <i class="fas fa-credit-card"></i>
                </div>
                <div class="flex-1">
                    <h3 class="font-semibold text-gray-900">Pembayaran</h3>
                    <p class="text-xs text-gray-500">BCA Virtual Account</p>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-sm"></i>
            </a>

            <a href="#" class="flex items-center gap-4 p-4 hover:bg-gray-50">
                <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center text-purple-600">
                    <i class="fas fa-headset"></i>
                </div>
                <div class="flex-1">
                    <h3 class="font-semibold text-gray-900">Bantuan</h3>
                    <p class="text-xs text-gray-500">Hubungi tim teknis</p>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-sm"></i>
            </a>
        </div>

        <button onclick="logout()" class="w-full mt-6 py-3 text-red-600 font-medium text-sm border border-red-200 rounded-xl hover:bg-red-50">
            <i class="fas fa-sign-out-alt mr-2"></i>Keluar
        </button>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-6 py-3 z-40">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <a href="home.html" class="flex flex-col items-center gap-1 text-gray-400">
                <i class="fas fa-home text-lg"></i>
                <span class="text-[10px] font-medium">Beranda</span>
            </a>
            <a href="search-results.html" class="flex flex-col items-center gap-1 text-gray-400">
                <i class="fas fa-search text-lg"></i>
                <span class="text-[10px] font-medium">Cari</span>
            </a>
            <a href="projects.html" class="flex flex-col items-center gap-1 text-gray-400">
                <i class="fas fa-folder text-lg"></i>
                <span class="text-[10px] font-medium">Proyek</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center gap-1 text-mitsubishi-red">
                <i class="fas fa-user text-lg"></i>
                <span class="text-[10px] font-medium">Profil</span>
            </a>
        </div>
    </nav>

    <script>
        function logout() {
            if(confirm('Yakin ingin keluar?')) {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
