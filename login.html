<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Oseï</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-900 h-screen overflow-hidden relative">
    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-black/50 to-black z-0">
        <img src="https://images.unsplash.com/photo-1565043666747-69f6646db940?w=800&auto=format&fit=crop" class="w-full h-full object-cover opacity-40" alt="Background">
    </div>
    <div class="relative z-10 h-full flex flex-col justify-center px-6">
        <a href="index.html" class="absolute top-6 left-6 text-white/70 hover:text-white">
            <i class="fas fa-arrow-left text-xl"></i>
        </a>
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Selamat Datang!</h1>
            <p class="text-mitsubishi-red font-medium">Masuk untuk melanjutkan</p>
        </div>
        <form class="space-y-4" onsubmit="event.preventDefault(); window.location.href='home.html';">
            <div>
                <input type="text" placeholder="Username / Email" class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3.5 text-white placeholder-gray-400 focus:outline-none focus:border-mitsubishi-red focus:bg-white/20 transition">
            </div>
            <div>
                <input type="password" placeholder="Password" class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3.5 text-white placeholder-gray-400 focus:outline-none focus:border-mitsubishi-red focus:bg-white/20 transition">
            </div>
            <div class="flex justify-between items-center text-sm">
                <label class="flex items-center text-gray-300 cursor-pointer">
                    <input type="checkbox" class="mr-2 rounded border-gray-500 text-mitsubishi-red focus:ring-mitsubishi-red">
                    Ingat saya
                </label>
                <a href="#" class="text-mitsubishi-red hover:underline">Lupa password?</a>
            </div>
            <button type="submit" class="w-full bg-mitsubishi-red hover:bg-red-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-red-900/50 transition-all active:scale-[0.98]">
                Masuk
            </button>
        </form>
        <div class="mt-6 text-center">
            <p class="text-gray-400 text-sm">Belum punya akun? <a href="#" class="text-white font-semibold hover:underline">Daftar</a></p>
        </div>
    </div>
</body>
</html>
