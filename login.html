<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Otomasiku</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/dark-mode.css" />
    <script src="assets/dark-mode.js"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .dark body {
        background-color: #0f0f0f !important;
      }
    </style>
  </head>
  <body class="bg-gray-900 h-screen overflow-hidden relative">
    <!-- Background image -->
    <div class="absolute inset-0 z-0">
      <img
        src="https://images.unsplash.com/photo-1565043666747-69f6646db940?w=800&auto=format&fit=crop"
        class="w-full h-full object-cover"
        alt="Background"
      />
    </div>
    <!-- Dark overlay di atas gambar -->
    <div
      class="absolute inset-0 z-[1] bg-gradient-to-b from-gray-900/75 via-gray-900/65 to-gray-900/90"
    ></div>
    <div
      class="relative z-[2] h-full flex flex-col justify-center px-6 max-w-md mx-auto"
    >
      <a
        href="index.html"
        class="absolute top-6 left-6 text-white hover:text-gray-300 transition"
      >
        <i class="fas fa-arrow-left text-xl"></i>
      </a>
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white mb-2">Selamat Datang!</h1>
        <p class="text-red-400 font-medium">Masuk untuk melanjutkan</p>
      </div>
      <form
        class="space-y-4"
        onsubmit="
          event.preventDefault();
          window.location.href = 'home.html';
        "
      >
        <div>
          <input
            type="text"
            placeholder="Username / Email"
            class="w-full bg-white/15 border border-white/30 rounded-xl px-4 py-3.5 text-white placeholder-gray-300 focus:outline-none focus:border-red-500 focus:bg-white/20 transition"
          />
        </div>
        <div>
          <input
            type="password"
            placeholder="Password"
            class="w-full bg-white/15 border border-white/30 rounded-xl px-4 py-3.5 text-white placeholder-gray-300 focus:outline-none focus:border-red-500 focus:bg-white/20 transition"
          />
        </div>
        <div class="flex justify-between items-center text-sm">
          <label class="flex items-center text-gray-200 cursor-pointer gap-2">
            <input
              type="checkbox"
              class="rounded border-gray-400 text-red-500 focus:ring-red-500 accent-red-500"
            />
            Ingat saya
          </label>
          <a
            href="#"
            class="text-red-400 hover:text-red-300 hover:underline transition"
            >Lupa password?</a
          >
        </div>
        <button
          type="submit"
          class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-red-900/50 transition-all active:scale-[0.98]"
        >
          Masuk
        </button>
      </form>
      <div class="mt-6 text-center">
        <p class="text-gray-300 text-sm">
          Belum punya akun?
          <a href="#" class="text-white font-semibold hover:underline"
            >Daftar</a
          >
        </p>
      </div>
    </div>
  </body>
</html>
