<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alamat Pengiriman - Oseï</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mitsubishi: { red: '#E7192D', dark: '#1a1a1a', grey: '#727070', light: '#F3F4F6' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FAFAFA; }
        .address-radio:checked + div { border-color: #E7192D; background-color: #FEF2F2; }
        .address-radio:checked + div .radio-circle { border-color: #E7192D; border-width: 5px; }
        .address-radio { appearance: none; -webkit-appearance: none; }
    </style>
</head>
<body class="bg-mitsubishi-light text-gray-800 pb-32">
    <header class="sticky top-0 z-50 bg-white border-b border-gray-100 shadow-sm">
        <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="checkout.html" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 transition">
                <i class="fas fa-arrow-left text-gray-600 text-lg"></i>
            </a>
            <h1 class="text-lg font-bold text-gray-900">Alamat Pengiriman</h1>
            <div class="w-10"></div> 
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 pt-6 space-y-6">
        <section>
            <h2 class="text-sm font-bold text-gray-900 mb-3 px-1">Pilih Alamat</h2>
            <div class="space-y-3" id="savedAddresses">
                <label class="block relative cursor-pointer group">
                    <input type="radio" name="address" class="address-radio absolute opacity-0" checked value="stefani">
                    <div class="bg-white p-4 rounded-xl border-2 border-mitsubishi-red bg-red-50/30 shadow-sm transition-all duration-200 flex items-start gap-3">
                        <div class="mt-1">
                            <div class="radio-circle w-5 h-5 rounded-full border-[5px] border-mitsubishi-red bg-white transition-all"></div>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="font-bold text-gray-900">Stefani Agustina</h3>
                                    <span class="inline-block mt-1 bg-blue-100 text-blue-700 text-[10px] px-2 py-0.5 rounded font-medium">Utama</span>
                                </div>
                                <button class="text-xs font-semibold text-mitsubishi-red hover:underline">Edit</button>
                            </div>
                            <p class="text-xs text-mitsubishi-grey mt-1">+62 812 3456 7890</p>
                            <p class="text-xs text-gray-600 mt-2 leading-relaxed">
                                PT Otomasi Indonesia<br>
                                Jl. Sudirman Kav. 28-30, Jakarta Selatan, 12920
                            </p>
                        </div>
                    </div>
                </label>

                <label class="block relative cursor-pointer group">
                    <input type="radio" name="address" class="address-radio absolute opacity-0" value="budi">
                    <div class="bg-white p-4 rounded-xl border-2 border-transparent shadow-sm transition-all duration-200 flex items-start gap-3 hover:border-gray-300">
                        <div class="mt-1">
                            <div class="radio-circle w-5 h-5 rounded-full border-2 border-gray-300 bg-white transition-all"></div>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <h3 class="font-bold text-gray-900">Budi Santoso</h3>
                                <button class="text-xs font-semibold text-mitsubishi-red hover:underline">Edit</button>
                            </div>
                            <p class="text-xs text-mitsubishi-grey mt-1">+62 813 9876 5432</p>
                            <p class="text-xs text-gray-600 mt-2 leading-relaxed">
                                Pabrik Cibitung<br>
                                Jl. Gatot Subroto No. 45, Bekasi, 17110
                            </p>
                        </div>
                    </div>
                </label>
            </div>
        </section>

        <div class="relative flex py-2 items-center">
            <div class="flex-grow border-t border-gray-200"></div>
            <span class="flex-shrink-0 mx-4 text-gray-400 text-xs font-medium">ATAU TAMBAH BARU</span>
            <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <section class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
            <h2 class="text-sm font-bold text-gray-900 mb-4">Tambah Alamat Baru</h2>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1.5">Nama Depan</label>
                    <input type="text" placeholder="Contoh: John" class="w-full bg-white border border-gray-300 rounded-lg py-2.5 px-3 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-mitsubishi-red focus:ring-1 focus:ring-mitsubishi-red">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1.5">Nama Belakang</label>
                    <input type="text" placeholder="Contoh: Doe" class="w-full bg-white border border-gray-300 rounded-lg py-2.5 px-3 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-mitsubishi-red focus:ring-1 focus:ring-mitsubishi-red">
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-xs font-medium text-gray-700 mb-1.5">Nomor Telepon</label>
                <div class="flex">
                    <div class="bg-gray-50 border border-r-0 border-gray-300 rounded-l-lg px-3 py-2.5 flex items-center text-sm text-gray-600 font-medium">+62</div>
                    <input type="tel" placeholder="812 3456 7890" class="flex-1 bg-white border border-gray-300 rounded-r-lg py-2.5 px-3 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-mitsubishi-red focus:ring-1 focus:ring-mitsubishi-red">
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-xs font-medium text-gray-700 mb-1.5">Alamat Lengkap</label>
                <textarea placeholder="Jl. Sudirman Kav. 28-30" rows="3" class="w-full bg-white border border-gray-300 rounded-lg py-2.5 px-3 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-mitsubishi-red focus:ring-1 focus:ring-mitsubishi-red resize-none"></textarea>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1.5">Kota</label>
                    <input type="text" placeholder="Jakarta Selatan" class="w-full bg-white border border-gray-300 rounded-lg py-2.5 px-3 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-mitsubishi-red focus:ring-1 focus:ring-mitsubishi-red">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1.5">Kode Pos</label>
                    <input type="text" placeholder="12920" class="w-full bg-white border border-gray-300 rounded-lg py-2.5 px-3 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-mitsubishi-red focus:ring-1 focus:ring-mitsubishi-red">
                </div>
            </div>
        </section>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-4 shadow-lg">
        <div class="max-w-3xl mx-auto">
            <button onclick="window.location.href='checkout.html'" class="w-full bg-mitsubishi-red hover:bg-red-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-red-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                <span>Simpan Alamat</span>
                <i class="fas fa-check text-sm"></i>
            </button>
        </div>
    </footer>
</body>
</html>
