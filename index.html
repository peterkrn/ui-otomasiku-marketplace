<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oseï - Mitsubishi Electric Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mitsubishi: { red: '#E7192D', dark: '#1a1a1a', grey: '#727070' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hero-bg { 
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1565043666747-69f6646db940?w=800&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        .slide-up { animation: slideUp 0.8s ease-out; }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-black h-screen overflow-hidden">
    <div class="hero-bg h-full w-full flex flex-col justify-end pb-12 px-6 relative">
        <div class="absolute top-12 left-0 right-0 text-center slide-up">
            <h1 class="text-white text-3xl font-bold tracking-wider">Oseï</h1>
            <p class="text-gray-300 text-sm mt-1">Automation Spareparts Marketplace</p>
        </div>
        <div class="absolute top-32 left-0 right-0 flex justify-center slide-up" style="animation-delay: 0.2s;">
            <div class="text-center">
                <div class="w-16 h-16 mx-auto mb-2 bg-red-600 rounded-full flex items-center justify-center">
                    <div class="grid grid-cols-2 gap-1">
                        <div class="w-3 h-3 bg-white transform rotate-45"></div>
                        <div class="w-3 h-3 bg-white transform rotate-45"></div>
                        <div class="w-3 h-3 bg-white transform rotate-45"></div>
                    </div>
                </div>
                <p class="text-white font-bold text-lg">MITSUBISHI</p>
                <p class="text-gray-400 text-xs">Electric</p>
            </div>
        </div>
        <div class="slide-up" style="animation-delay: 0.4s;">
            <a href="login.html" class="block w-full bg-white/10 backdrop-blur-md border border-white/30 text-white font-semibold py-4 rounded-2xl text-center hover:bg-white/20 transition-all duration-300 group">
                <span class="flex items-center justify-center gap-2">
                    Mulai Sekarang!
                    <i class="fas fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
                </span>
            </a>
            <p class="text-center text-gray-400 text-xs mt-4">Distributor Resmi Mitsubishi Electric & Danfoss</p>
        </div>
    </div>
</body>
</html>
